# Local end-to-end test of the Docker images before deploying to GCP.
#   docker compose up --build
# Frontend -> http://localhost:3000   Backend -> http://localhost:8080
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: hivemind
      JWT_SECRET: dev-only-change-me
      CORS_ORIGINS: http://localhost:3000
      # EMERGENT_LLM_KEY: ""   # optional: enables proof-of-work file storage
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        # For local same-machine testing the browser talks to localhost:8080.
        REACT_APP_BACKEND_URL: http://localhost:8080
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      - backend

volumes:
  mongo_data:
